name: Build and Deploy to cPanel

# Every push to main: build in the cloud (clean env — no CloudLinux/Turbopack issues),
# then upload the build + source to the cPanel server over FTP and restart Passenger.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22 (matches the server runtime)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Stamp restart trigger (forces Passenger to restart after deploy)
        run: mkdir -p tmp && echo "${{ github.sha }}" > tmp/restart.txt

      - name: Deploy over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Plain FTP: this host's FTPS sessions drop mid-transfer ("FIN packet"), and the
          # per-file TLS handshakes are slow. Plain FTP is much faster for many small files.
          protocol: ftp
          port: 21
          timeout: 120000
          # The FTP account (developer@safestorage.in) is rooted at /home/safestor/public_html,
          # so the app dir is relative to that. (Using public_html/... here would nest into
          # /home/safestor/public_html/public_html/... and the running app would never see it.)
          server-dir: safestorage-transport/
          local-dir: ./
          # node_modules stays on the server (CloudLinux symlink); never upload it.
          # .next/cache is build-only and huge — skip it.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            **/.next/cache/**
            **/*.map
            **/*.nft.json
            tmp/**
            .env
            .env.*

      # Upload the restart stamp LAST, in its own pass, so Passenger only restarts
      # after every app file is in place (avoids restarting onto a half-uploaded build).
      - name: Trigger Passenger restart
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./tmp/
          server-dir: safestorage-transport/tmp/
          state-name: .ftp-deploy-tmp-state.json
